# Copy to ~/.meringue/config.toml and adjust for your machine.

[tui]
# Default yellow/white Meringue palette. Other options:
# rose-pine, tokyonight, gruvbox, catppuccin, kanagawa
# You can also run /theme <name> in the TUI to save this setting.
colorscheme = "meringue"

[tui.keybindings]
# Omitted actions keep defaults. Use /keybind in the TUI to see active bindings.
# agent_select_previous = ["k", "up", "left"]
# agent_select_next = ["j", "down", "right"]

[harness]
# provider applies to both head and worker agents unless overridden below.
provider = "pi"
# head_provider = "river"
# worker_provider = "claude"

[harness.pi]
command = "pi"
session_dir = "~/.meringue/pi-sessions"
head_extra_args = ["--thinking", "high", "--tools", "read,bash,grep,find,ls", "--no-extensions", "--no-skills", "--no-prompt-templates", "--no-context-files", "--no-approve"]
worker_extra_args = ["--thinking", "high", "--tools", "read,bash,grep,find,ls,edit,write", "--no-extensions", "--no-skills", "--no-prompt-templates", "--no-context-files", "--no-approve"]

[harness.river]
# Put the official launcher on PATH. Shopify users can verify it with:
# tec run //system/river/agent -- --version
command = "river-agent"
session_dir = "~/.meringue/river-sessions"
head_extra_args = ["--tools", "read,bash,grep,find,ls", "--no-context-files"]
worker_extra_args = ["--no-context-files"]

[harness.claude]
command = "claude"
use_json_schema = true
head_extra_args = ["--effort", "high", "--tools", "Read,Glob,Grep,Bash", "--permission-mode", "plan", "--disable-slash-commands"]
worker_extra_args = ["--effort", "high", "--permission-mode", "acceptEdits"]

[harness.antigravity]
command = "agy"
head_extra_args = []
worker_extra_args = []

[terminal]
# alacritty_command = "/Applications/Alacritty.app/Contents/MacOS/alacritty"
